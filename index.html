<!DOCTYPE html>
<html>
<head>
    <title>3 en Raya P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        #board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; }
        .cell { width: 100px; height: 100px; border: 1px solid #000; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Ceros y Raya P2P</h1>
    
    <div id="setup">
        <p>Tu ID para que te busquen: <b id="my-id">...</b></p>
        <input type="text" id="peer-id" placeholder="ID del oponente">
        <button onclick="connectToPeer()">Conectar y Jugar</button>
    </div>

    <div id="board" style="display:none;">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        </div>

    <script>
        const peer = new Peer(); // Crea tu identificador automáticamente
        let conn;

        // Mostrar tu ID cuando PeerJS esté listo
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // Esperar a que alguien se conecte a ti
        peer.on('connection', (connection) => {
            conn = connection;
            setupGame();
        });

        // Función para conectarte tú a otro
        function connectToPeer() {
            const remoteId = document.getElementById('peer-id').value;
            conn = peer.connect(remoteId);
            setupGame();
        }

        function setupGame() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('board').style.display = 'grid';
            
            conn.on('data', (data) => {
                console.log("Recibido movimiento:", data);
                // Aquí actualizas el tablero con lo que mandó el otro
            });
        }

        function makeMove(index) {
            // Lógica para marcar tu X o O
            conn.send({ position: index, symbol: 'X' });
        }
    </script>
</body>
</html>
